<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 35 - Brute Force Basic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Admin Login</h1>
            <p>The admin password is a common 4-digit PIN. Can you guess it?</p>
            <div class="form-group">
                <input type="text" id="pin-input" placeholder="Enter 4-digit PIN" maxlength="4">
            </div>
            <button class="modern-button" onclick="checkPin()">Login</button>
            <div id="result" class="hidden">
                <div class="alert success">
                    <strong>Logged in!</strong> The flag is: <span class="flag">FLAG{BRUTE_FORCE_PIN_SUCCESS}</span>
                </div>
            </div>
            <p class="hint">Tip: Try common PINs like <code>1234</code>, <code>0000</code>, or <code>1111</code>. In a real attack, you'd use a script.</p>
        </div>
    </div>
    <script>
        function checkPin() {
            const pin = document.getElementById('pin-input').value;
            const result = document.getElementById('result');
            
            // The secret PIN is '1337'
            if (pin === '1337') {
                result.classList.remove('hidden');
            } else {
                alert("Invalid PIN!");
            }
        }
    </script>
</body>
</html>
