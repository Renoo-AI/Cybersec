<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 9 - Hidden isAdmin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Admin Form</h1>
            <p>This form has a hidden field that determines your role. Can you become an admin?</p>
            <form id="admin-form" onsubmit="return handleSubmit(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" value="guest" readonly>
                </div>
                <input type="hidden" name="isAdmin" value="false">
                <button type="submit" class="modern-button">Submit</button>
            </form>
            <div id="result" class="hidden">
                <div class="alert success">
                    <strong>Admin Access!</strong> The flag is: <span class="flag">FLAG{HIDDEN_INPUT_TAMPERING}</span>
                </div>
            </div>
            <p class="hint">Tip: Inspect the form and change the hidden input value to 'true'.</p>
        </div>
    </div>
    <script>
        function handleSubmit(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const isAdmin = formData.get('isAdmin');
            
            if (isAdmin === 'true') {
                document.getElementById('result').classList.remove('hidden');
            } else {
                alert('Access Denied: You are not an admin.');
            }
            return false;
        }
    </script>
</body>
</html>
