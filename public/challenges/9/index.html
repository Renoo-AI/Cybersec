<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 9 - Cookie Role</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container { border: 1px solid #00ff41; padding: 2rem; }
        .cookie-display { background: #1a1a1a; padding: 1rem; border-radius: 4px; margin-top: 1rem; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SESSION MANAGER</h1>
        <p>Your session is active.</p>
        <div class="cookie-display">
            Cookie: <strong>role=user</strong>
        </div>
        <p style="margin-top: 2rem; font-size: 0.8rem; opacity: 0.7;">Hint: Can you change your role to admin in the browser cookies?</p>
        <div id="flag" style="display:none; margin-top: 2rem; color: #ff4444; font-weight: bold;">
            FLAG{COOKIES_ARE_NOT_VAULTS}
        </div>
    </div>
    <script>
        // In this simulation, we check for a URL parameter 'role' to mimic cookie editing
        const params = new URLSearchParams(window.location.search);
        if (params.get('role') === 'admin') {
            document.getElementById('flag').style.display = 'block';
            document.querySelector('.cookie-display').innerHTML = 'Cookie: <strong>role=admin</strong>';
        }
    </script>
</body>
</html>
