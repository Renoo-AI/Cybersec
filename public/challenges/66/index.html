<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 66 - Verbose Errors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>System Login</h1>
            <p>Login to the system. Can you find sensitive information in the error messages?</p>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="modern-input" placeholder="Enter username...">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="modern-input" placeholder="Enter password...">
            </div>
            <button class="modern-button" onclick="login()">Login</button>
            <div id="error-container" class="error-container hidden">
                <div class="alert danger">
                    <strong>Error:</strong> <span id="error-message"></span>
                </div>
            </div>
            <p class="hint">Tip: Try entering a single quote <code>'</code> in the username field to trigger a verbose database error.</p>
        </div>
    </div>
    <script>
        function login() {
            const username = document.getElementById('username').value;
            const errorContainer = document.getElementById('error-container');
            const errorMessage = document.getElementById('error-message');
            
            if (username.includes("'")) {
                errorContainer.classList.remove('hidden');
                errorMessage.innerHTML = "SQL Syntax Error: You have an error in your SQL syntax; check the manual that corresponds to your MySQL server version for the right syntax to use near '''' at line 1. <br><br><strong>Debug Info:</strong> DB_VERSION: 10.5.12-MariaDB, FLAG: FLAG{VERBOSE_ERROR_MESSAGES_LEAK_SENSITIVE_DATA}";
            } else {
                errorContainer.classList.remove('hidden');
                errorMessage.textContent = "Invalid username or password.";
            }
        }
    </script>
</body>
</html>
