<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 11 - JS Leak</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container { border: 1px solid #00ff41; padding: 2rem; }
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; margin-bottom: 10px; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SECURE LOGIN</h1>
        <p>Enter the master password.</p>
        <input type="password" id="pass" placeholder="Password">
        <button onclick="check()">LOGIN</button>
        <div id="msg" style="margin-top: 1rem;"></div>
    </div>

    <script>
        // SECRET LOGIC - DON'T LOOK!
        const SECRET_KEY = "p@ssword123_secure_vault";
        
        function check() {
            const val = document.getElementById('pass').value;
            const msg = document.getElementById('msg');
            if (val === SECRET_KEY) {
                msg.innerHTML = '<span style="color: #ff4444">ACCESS GRANTED! FLAG{JS_LEAKS_SECRETS_2026}</span>';
            } else {
                msg.innerText = "Invalid password. Try again.";
            }
        }
        
        console.log("Debug mode enabled. Check the source code for the check() function.");
    </script>
</body>
</html>
