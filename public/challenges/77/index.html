<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 77 - Insecure Direct Object Reference (IDOR) - User Profile Edit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Edit Profile</h1>
            <p>Update your profile information. Can you edit other users' profiles?</p>
            <div id="status-info">
                <div class="alert info">
                    <strong>Logged in as:</strong> <span class="highlight">User_1001</span>
                </div>
            </div>
            <div class="profile-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="modern-input" value="User_1001">
                </div>
                <div class="form-group">
                    <label for="bio">Bio</label>
                    <textarea id="bio" class="modern-input">Just a regular user.</textarea>
                </div>
                <div id="secret-flag" class="info-item hidden">
                    <span class="label">Admin Flag:</span>
                    <span class="value">FLAG{IDOR_PROFILE_EDIT_LEAK_VULNERABILITY}</span>
                </div>
                <button class="modern-button" onclick="saveProfile()">Save Profile</button>
            </div>
            <p class="hint">Tip: Try changing the <code>id</code> parameter in the URL to <code>1</code> to access the admin's profile edit page.</p>
        </div>
    </div>
    <script>
        const profiles = {
            '1001': { username: 'User_1001', bio: 'Just a regular user.' },
            '1002': { username: 'User_1002', bio: 'I love security challenges!' },
            '1': { username: 'ADMINISTRATOR', bio: 'SYSTEM_ROOT_BIO', flag: 'FLAG{IDOR_PROFILE_EDIT_LEAK_VULNERABILITY}' }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id') || '1001';
        
        const profile = profiles[id] || { username: '', bio: '' };
        document.getElementById('username').value = profile.username;
        document.getElementById('bio').value = profile.bio;

        if (id === '1') {
            document.getElementById('secret-flag').classList.remove('hidden');
        }

        function saveProfile() {
            alert("Profile saved successfully!");
        }
    </script>
</body>
</html>
