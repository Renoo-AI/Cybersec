<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 20 - Login Bypass JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Secure Login</h1>
            <p>This login form is protected by a client-side check. Can you bypass it?</p>
            <div class="form-group">
                <input type="text" id="user" placeholder="Username">
            </div>
            <div class="form-group">
                <input type="password" id="pass" placeholder="Password">
            </div>
            <button class="modern-button" onclick="login()">Login</button>
            <div id="result" class="hidden">
                <div class="alert success">
                    <strong>Logged in!</strong> The flag is: <span class="flag">FLAG{JS_LOGIN_BYPASS_EASY}</span>
                </div>
            </div>
            <p class="hint">Tip: Look at the <code>login</code> function. Maybe you can just call it with the right values or bypass the check?</p>
        </div>
    </div>
    <script>
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            
            // Hardcoded check
            if (u === 'admin' && p === 'password123') {
                document.getElementById('result').classList.remove('hidden');
            } else {
                alert("Login Failed!");
            }
        }
    </script>
</body>
</html>
