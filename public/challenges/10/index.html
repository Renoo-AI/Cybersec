<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 10 - Price Tamper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Checkout</h1>
            <p>You are about to purchase a premium item. Can you get it for free?</p>
            <div class="product-card">
                <div class="product-info">
                    <h3>Premium Flag</h3>
                    <p>Unlock the secret flag with this purchase.</p>
                </div>
                <div class="product-price">
                    <span id="display-price">$100.00</span>
                </div>
            </div>
            <div class="form-group">
                <button id="buy-btn" class="modern-button" onclick="handlePurchase()">Buy Now</button>
            </div>
            <div id="result" class="hidden">
                <div class="alert success">
                    <strong>Purchase Successful!</strong> The flag is: <span class="flag">FLAG{PRICE_MANIPULATION_SUCCESS}</span>
                </div>
            </div>
            <p class="hint">Tip: Check the URL parameters. Maybe you can change the price?</p>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const priceParam = urlParams.get('price');
        const displayPrice = document.getElementById('display-price');
        
        if (priceParam !== null) {
            displayPrice.textContent = '$' + parseFloat(priceParam).toFixed(2);
        }

        function handlePurchase() {
            const currentPrice = parseFloat(urlParams.get('price') || '100');
            if (currentPrice <= 0) {
                document.getElementById('result').classList.remove('hidden');
            } else {
                alert('Insufficient funds! You need more money to pay $' + currentPrice.toFixed(2));
            }
        }
    </script>
</body>
</html>
