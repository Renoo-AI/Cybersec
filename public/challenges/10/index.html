<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 10 - Base64 Cookie</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container { border: 1px solid #00ff41; padding: 2rem; }
        .cookie-display { background: #1a1a1a; padding: 1rem; border-radius: 4px; margin-top: 1rem; font-size: 0.9rem; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ENCODED SESSION</h1>
        <p>Your session token is encoded.</p>
        <div class="cookie-display">
            Token: <strong>cm9sZT11c2Vy</strong>
        </div>
        <p style="margin-top: 2rem; font-size: 0.8rem; opacity: 0.7;">Hint: cm9sZT11c2Vy is Base64 for role=user. What is role=admin?</p>
        <div id="flag" style="display:none; margin-top: 2rem; color: #ff4444; font-weight: bold;">
            FLAG{DECODE_THEN_EDIT_WIN}
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        // cm9sZT1hZG1pbg== is Base64 for role=admin
        if (params.get('token') === 'cm9sZT1hZG1pbg==') {
            document.getElementById('flag').style.display = 'block';
            document.querySelector('.cookie-display').innerHTML = 'Token: <strong>cm9sZT1hZG1pbg==</strong>';
        }
    </script>
</body>
</html>
