<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 15 - Price Manipulation</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container { border: 1px solid #00ff41; padding: 2rem; width: 300px; }
        .item { border: 1px solid #333; padding: 1rem; margin-bottom: 1rem; }
        .price { font-size: 1.5rem; color: #ffcc00; margin: 10px 0; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CYBER SHOP</h1>
        <div class="item">
            <h3>Golden Flag</h3>
            <p class="price" id="priceDisplay">$1,000,000</p>
            <button onclick="buy()">BUY NOW</button>
        </div>
        <div id="msg" style="margin-top: 1rem;"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const price = params.get('price') || '1000000';
        
        document.getElementById('priceDisplay').innerText = '$' + Number(price).toLocaleString();

        function buy() {
            const msg = document.getElementById('msg');
            if (Number(price) <= 0) {
                msg.innerHTML = '<span style="color: #ff4444">FREE PURCHASE! FLAG{NEVER_TRUST_USER_INPUT_WIN}</span>';
            } else {
                msg.innerText = "Insufficient funds. You need $" + price + ".";
            }
        }
    </script>
</body>
</html>
