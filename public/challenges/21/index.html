<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL - User Settings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="enterprise-container">
        <nav class="sidebar">
            <div class="logo">SENTINEL</div>
            <ul>
                <li>Dashboard</li>
                <li class="active">Settings</li>
                <li>Security</li>
                <li>Logs</li>
            </ul>
        </nav>
        <main class="content">
            <header>
                <h1>User Settings</h1>
                <div class="user-profile">Admin User</div>
            </header>
            <div class="settings-grid">
                <div class="settings-card">
                    <h3>Profile Information</h3>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" value="admin" disabled>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" value="admin@sentinel.corp" disabled>
                    </div>
                </div>
                <div class="settings-card">
                    <h3>Security Tokens</h3>
                    <p class="text-muted">Active session tokens are stored securely in your browser environment.</p>
                    <div class="token-status">
                        <span class="status-dot online"></span>
                        Session Active
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        // Phase 2: Hide flag in localStorage as auth_token
        localStorage.setItem('auth_token', 'FLAG{IDOR_VULNERABILITY_REALISM}');
    </script>
</body>
</html>
