<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 40 - Broken Authentication</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Password Reset</h1>
            <p>Reset your password. Enter your email to receive a reset link.</p>
            <div id="status-info">
                <div class="alert info">
                    <strong>Email:</strong> <span class="highlight">admin@example.com</span>
                </div>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="modern-input" placeholder="Enter email...">
            </div>
            <button class="modern-button" onclick="resetPassword()">Reset Password</button>
            <div id="result" class="hidden">
                <div class="alert success">
                    <strong>Reset Successful!</strong> The flag is: <span class="flag">FLAG{BROKEN_AUTH_RESET_TOKEN_EXPOSURE}</span>
                </div>
            </div>
            <p class="hint">Tip: Check the URL parameters after clicking reset. The token might be exposed.</p>
        </div>
    </div>
    <script>
        function resetPassword() {
            const email = document.getElementById('email').value;
            const result = document.getElementById('result');
            
            if (email === 'admin@example.com') {
                // Simulation: Token exposed in URL
                const token = "FLAG{BROKEN_AUTH_RESET_TOKEN_EXPOSURE}";
                window.location.search = `?token=${token}`;
            } else {
                alert("Invalid email. Try again.");
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('token')) {
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
