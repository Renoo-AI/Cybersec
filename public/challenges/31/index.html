<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 31 - XSS Alert</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Guestbook</h1>
            <p>Leave a comment on our guestbook. Can you trigger an alert box?</p>
            <div class="form-group">
                <input type="text" id="comment-input" placeholder="Enter your comment">
            </div>
            <button class="modern-button" onclick="addComment()">Post Comment</button>
            <div id="comments-list" class="comments-list">
                <h3>Comments:</h3>
                <div id="comments-container"></div>
            </div>
            <div id="result" class="hidden">
                <div class="alert success">
                    <strong>XSS Triggered!</strong> The flag is: <span class="flag">FLAG{XSS_ALERT_SUCCESS}</span>
                </div>
            </div>
            <p class="hint">Tip: Try a basic script tag like <code>&lt;script&gt;alert(1)&lt;/script&gt;</code>.</p>
        </div>
    </div>
    <script>
        // Override alert to detect XSS
        const originalAlert = window.alert;
        window.alert = function(msg) {
            document.getElementById('result').classList.remove('hidden');
            originalAlert("XSS Alert Triggered: " + msg);
        };

        function addComment() {
            const input = document.getElementById('comment-input');
            const container = document.getElementById('comments-container');
            const comment = input.value;
            
            const div = document.createElement('div');
            div.className = 'comment-item';
            // VULNERABLE: Using innerHTML directly
            div.innerHTML = comment;
            container.appendChild(div);
            
            // Execute scripts if any (innerHTML doesn't execute <script> tags automatically)
            const scripts = div.getElementsByTagName('script');
            for (let s of scripts) {
                eval(s.innerText);
            }
            
            input.value = '';
        }
    </script>
</body>
</html>
