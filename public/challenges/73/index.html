<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 73 - Insecure Direct Object Reference (IDOR) - Private Files</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>File Manager</h1>
            <p>Access your private files. Can you access other users' files?</p>
            <div id="status-info">
                <div class="alert info">
                    <strong>Logged in as:</strong> <span class="highlight">User_1001</span>
                </div>
            </div>
            <div class="file-list">
                <div class="info-item">
                    <span class="label">File ID:</span>
                    <span id="file-id" class="value">FILE-7001</span>
                </div>
                <div class="info-item">
                    <span class="label">File Name:</span>
                    <span id="file-name" class="value">resume.pdf</span>
                </div>
                <div class="info-item">
                    <span class="label">Size:</span>
                    <span id="file-size" class="value">1.2 MB</span>
                </div>
                <div id="secret-flag" class="info-item hidden">
                    <span class="label">Admin Flag:</span>
                    <span class="value">FLAG{IDOR_PRIVATE_FILES_LEAK_VULNERABILITY}</span>
                </div>
            </div>
            <p class="hint">Tip: Try changing the <code>id</code> parameter in the URL to <code>1</code> to access the admin's private files.</p>
        </div>
    </div>
    <script>
        const files = {
            '7001': { name: 'resume.pdf', size: '1.2 MB' },
            '7002': { name: 'photo.jpg', size: '2.5 MB' },
            '1': { name: 'SECRET_FLAG.txt', size: '0.1 KB', flag: 'FLAG{IDOR_PRIVATE_FILES_LEAK_VULNERABILITY}' }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id') || '7001';
        
        const file = files[id] || { name: 'Unknown', size: 'N/A' };
        document.getElementById('file-id').textContent = "FILE-" + id;
        document.getElementById('file-name').textContent = file.name;
        document.getElementById('file-size').textContent = file.size;

        if (id === '1') {
            document.getElementById('secret-flag').classList.remove('hidden');
        }
    </script>
</body>
</html>
