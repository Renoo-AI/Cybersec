<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 2 - Simple SQLi</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            border: 1px solid #00ff41;
            padding: 2rem;
            background: rgba(0, 255, 65, 0.05);
            width: 300px;
        }
        h2 { text-align: center; margin-top: 0; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.8rem; }
        input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #00ff41;
            padding: 8px;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: #00ff41; }
        button {
            width: 100%;
            background: #00ff41;
            color: #0a0a0a;
            border: none;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }
        button:hover { background: #00cc33; }
        #message { margin-top: 1rem; text-align: center; font-size: 0.9rem; min-height: 1.2em; }
        .success { color: #00ff41; }
        .error { color: #ff4444; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>ADMIN LOGIN</h2>
        <div class="input-group">
            <label>USERNAME</label>
            <input type="text" id="username" placeholder="admin">
        </div>
        <div class="input-group">
            <label>PASSWORD</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button onclick="login()">LOGIN</button>
        <div id="message"></div>
    </div>

    <script>
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('message');

            // SIMULATED VULNERABLE SQL QUERY:
            // SELECT * FROM users WHERE username = '${user}' AND password = '${pass}'
            
            // Vulnerable logic: if user contains ' OR '1'='1
            if (user.includes("' OR '1'='1") || pass.includes("' OR '1'='1")) {
                msg.innerHTML = '<span class="success">ACCESS GRANTED! FLAG{ALWAYS_SANITIZE_INPUTS}</span>';
            } else if (user === 'admin' && pass === 'password123') {
                msg.innerHTML = '<span class="success">Welcome back, Admin.</span>';
            } else {
                msg.innerHTML = '<span class="error">INVALID CREDENTIALS</span>';
            }
        }
    </script>
</body>
</html>
