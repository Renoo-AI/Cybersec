<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 6 - IDOR</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .profile-card { border: 1px solid #00ff41; padding: 2rem; width: 300px; }
        .avatar { width: 80px; height: 80px; background: #333; border-radius: 50%; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="avatar" id="avatar">👤</div>
        <h2 id="name">Guest User</h2>
        <p id="bio">Welcome to your profile.</p>
        <div id="flag" style="display:none; color: #ff4444; font-weight: bold; border-top: 1px dashed #444; padding-top: 1rem; margin-top: 1rem;">
            FLAG{IDOR_FOUND_YOU}
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id') || '1';
        
        const nameEl = document.getElementById('name');
        const bioEl = document.getElementById('bio');
        const avatarEl = document.getElementById('avatar');
        const flagEl = document.getElementById('flag');

        if (id === '2') {
            nameEl.innerText = 'Administrator';
            bioEl.innerText = 'System owner. Keep out!';
            avatarEl.innerText = '⚡';
            flagEl.style.display = 'block';
        } else {
            nameEl.innerText = 'Guest User';
            bioEl.innerText = 'Welcome to your profile.';
            avatarEl.innerText = '👤';
            flagEl.style.display = 'none';
        }
    </script>
</body>
</html>
