<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 16 - File Guessing</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container { border: 1px solid #00ff41; padding: 2rem; }
        .terminal { background: #000; padding: 1rem; border: 1px solid #333; text-align: left; font-size: 0.8rem; min-height: 100px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BACKUP SERVER</h1>
        <p>Directory listing is disabled for security.</p>
        <div class="terminal" id="output">
            $ ls -la<br>
            ls: cannot open directory '.': Permission denied
        </div>
        <p style="margin-top: 2rem; font-size: 0.8rem; opacity: 0.7;">Hint: Developers often leave backups like backup.zip, config.old, or db.sql.</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const file = params.get('file');
        
        if (file === 'db.sql' || file === 'backup.zip' || file === 'config.php.bak') {
            document.getElementById('output').innerHTML = `
                $ cat ${file}<br>
                -- Database Backup --<br>
                -- 2026-03-19 --<br><br>
                <span style="color: #ff4444">FLAG{BACKUP_FILES_MATTER_WIN}</span>
            `;
        }
    </script>
</body>
</html>
